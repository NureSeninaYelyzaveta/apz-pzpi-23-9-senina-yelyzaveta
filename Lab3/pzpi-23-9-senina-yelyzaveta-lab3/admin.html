<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ArtProgress | Адмін панель</title>

    <!-- CSS -->
    <link rel="stylesheet" href="css/admin.css">
</head>
<body>

    <header>
        <h1 class="site-title">ArtProgress | Admin</h1>
        <div class="admin-info" id="adminInfo"></div>
    </header>

    <main class="admin-container">

        <!-- СТАТИСТИКА -->
        <section class="card">
            <h2> Статистика системи</h2>

            <div class="stats-row">

                <div class="stat-card">
                    <p>Студенти</p>
                    <h3 id="studentsCount">0</h3>
                </div>

                <div class="stat-card">
                    <p>Викладачі</p>
                    <h3 id="teachersCount">0</h3>
                </div>

                <div class="stat-card">
                    <p>Оцінки</p>
                    <h3 id="gradesCount">0</h3>
                </div>

                <div class="stat-card">
                    <p>Дисципліни</p>
                    <h3 id="disciplinesCount">0</h3>
                </div>

                <div class="stat-card highlight">
                    <p>Середній бал</p>
                    <h3 id="avgGrade">0</h3>
                </div>

            </div>

        </section>

        <!-- ДИСЦИПЛИНЫ -->
        <section class="card">
            <h2> Управління дисциплінами</h2>

            <input type="text" id="disciplineInput" placeholder="Нова дисципліна...">
            <button id="addDisciplineBtn">Додати</button>

            <div id="disciplinesList" class="disciplines-list"></div>
        </section>

    </main>

    <!-- JS -->
    <script src="js/admin.js"></script>

</body>
</html>
