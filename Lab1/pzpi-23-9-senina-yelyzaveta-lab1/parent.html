<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ArtProgress | Профіль батьків</title>
    <link rel="stylesheet" href="css/parent.css">
</head>
<body>

    <header>
        <h1 class="site-title">ArtProgress</h1>
        <div class="notifications" id="notifications"></div>
    </header>

    
    <main>

        <!-- ліва частина -->
        <div class="profile-sidebar">

            <div class="profile-photo">
                <img id="profilePhoto" src="default-avatar.png">
                <label for="uploadPhoto" class="upload-btn">Змінити фото</label>
                <input type="file" id="uploadPhoto">
            </div>

            <div class="profile-info">
                <h2 id="parentName"></h2>
                <p id="parentEmail"></p>
            </div>

        </div>

        <!-- права частина -->
        <div class="grades-section">

            <h2 id="childName"></h2>
            <p id="averageGrade"></p>

            <table class="grades-table">
                <thead>
                    <tr>
                        <th>Предмет</th>
                        <th>Оцінка</th>
                        <th>Вчитель</th>
                        <th>Дата</th>
                    </tr>
                </thead>
                <tbody id="gradesTable"></tbody>
            </table>

        </div>

    </main>

    <script src="js/parent.js"></script>

</body>
</html>
