<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ArtProgress | Профіль вчителя</title>
    <link rel="stylesheet" href="css/teacher.css">
</head>
<body>

    <header>
        <h1 class="site-title">ArtProgress</h1>
        <div class="notifications" id="notifications">
          
        </div>
    </header>

    <main>

       
        <div class="top-section">

            <!--ліва частина -->
            <aside class="profile-sidebar">

                <div class="profile-header">

                    <div class="profile-photo">
                        <img id="profilePhoto" src="img/default-avatar.png" alt="Фото профілю">

                        <label for="uploadPhoto" class="upload-btn">
                            Змінити фото профілю
                        </label>
                        <input type="file" id="uploadPhoto" accept="image/*">
                    </div>

                    <div class="profile-info">
                        <h2 id="teacherName">Ім’я</h2>
                        <p id="teacherPosition">Посада</p>
                        <p id="teacherEmail">Email</p>
                        <textarea id="teacherDescription" placeholder="Опис профілю..."></textarea>
                    </div>
                </div>  
            </aside>

            <!-- права частина -->
            <section class="add-grade-section">
                <h2>Додати оцінку</h2>

                <input type="text" id="studentSearch" placeholder="Почніть вводити ім’я учня">
                <ul id="studentSuggestions"></ul>

                <select id="disciplineSelect"></select>

                <input type="number" id="gradeValue" placeholder="Оцінка">

                <button class="btn" id="addGradeBtn">Додати</button>
            </section>

        </div>

        <!-- нижня частина -->
        <section class="grades-section">
            <h2>Останні оцінки</h2>

            <table class="grades-table">
                <thead>
                    <tr>
                        <th>Учень</th>
                        <th>Предмет</th>
                        <th>Оцінка</th>
                        <th>Дата</th>
                    </tr>
                </thead>
                <tbody id="gradesTable"></tbody>
            </table>
        </section>

    </main>

    <script src="js/teacher.js"></script>
</body>
</html>
