<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Авторизація ArtProgress</title>
    <link rel="stylesheet" href="css/style.css">
  
</head>
<body>
    <div class="auth-container">
        <div class="auth-card">
            <h2>Вітаємо в ArtProgress</h2>
            <form id="loginForm">
                <label for="username">Ім'я користувача</label>
                <input type="text" id="username" name="username" placeholder="Введіть ім'я" required>

                <label for="email">email</label>
                <input type="email" id="email" name="email" placeholder="Введіть email" required>

                <label for="role">Виберіть роль</label>
                <select id="role" name="role" required>
                    <option value="">Оберіть роль</option>
                    <option value="student">Студент</option>
                    <option value="teacher">Вчитель</option>
                    <option value="parent">Батько</option>
                    <option value="admin">Адмін</option>
                </select>

                <button type="submit">Увійти</button>
                <p class="switch-text">Немає акаунта? <span id="showRegister">Зареєструватися</span></p>
            </form>

            <form id="registerForm" style="display:none;">
                <input type="text" id="regName" placeholder="Ім'я" required>
                <input type="text" id="regContact" placeholder="email">

                <select id="regRole" required>
                    <option value="">Оберіть роль</option>
                    <option value="student">Студент</option>
                    <option value="teacher">Вчитель</option>
                    <option value="parent">Батько</option>
                </select>

                <button type="submit">Зареєструватися</button>
            </form>

        </div>
    </div>
    <script src="js/main.js"></script>
</body>
</html>
